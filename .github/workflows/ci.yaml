---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      app: ${{ steps.paths.outputs.app }}
      renovate: ${{ steps.paths.outputs.renovate }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect changed paths
        id: paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            app:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - '.dockerignore'
            renovate:
              - '.github/renovate.json5'
              - '.github/workflows/ci.yaml'
              - '.github/workflows/test.yml'

  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: [test, detect]
    if: github.event_name == 'pull_request' && needs.detect.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify base images
        run: |
          DISTROLESS_REF=$(grep '^FROM gcr.io/distroless/' Dockerfile | awk '{print $2}')
          echo "Verifying ${DISTROLESS_REF}"
          cosign verify "${DISTROLESS_REF}" \
            --certificate-oidc-issuer https://accounts.google.com \
            --certificate-identity keyless@distroless.iam.gserviceaccount.com

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          outputs: type=cacheonly
          annotations: |
            index:org.opencontainers.image.description=Prometheus exporter for AdGuard Home query logs
            index:org.opencontainers.image.source=https://github.com/sholdee/adguard-exporter
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=dev
            org.opencontainers.image.created=${{ github.event.pull_request.updated_at }}
          cache-from: type=gha,scope=adguard-exporter
          cache-to: type=gha,scope=adguard-exporter,mode=max,ignore-error=true

  renovate:
    needs: detect
    if: needs.detect.outputs.renovate == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Renovate config
        run: npx --yes --package renovate@43.234.0 -- renovate-config-validator --strict

  gate:
    runs-on: ubuntu-latest
    if: always()
    needs: [detect, test, build, renovate]
    permissions: {}
    steps:
      - name: Evaluate results
        env:
          DETECT: ${{ needs.detect.result }}
          TEST: ${{ needs.test.result }}
          BUILD: ${{ needs.build.result }}
          RENOVATE: ${{ needs.renovate.result }}
        run: |
          echo "detect=${DETECT} test=${TEST} build=${BUILD} renovate=${RENOVATE}"

          for result in "${DETECT}" "${TEST}" "${BUILD}" "${RENOVATE}"; do
            if [[ "${result}" != "success" && "${result}" != "skipped" ]]; then
              echo "CI failed: job returned ${result}"
              exit 1
            fi
          done

          echo "CI passed"
