---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      app: ${{ steps.paths.outputs.app }}
      renovate: ${{ steps.paths.outputs.renovate }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Detect changed paths
        id: paths
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            app:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'Dockerfile'
              - '.dockerignore'
            renovate:
              - '.github/renovate.json5'
              - '.github/workflows/ci.yaml'
              - '.github/workflows/test.yml'

  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: [test, detect]
    if: github.event_name == 'pull_request' && needs.detect.outputs.app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Verify base images
        run: |
          DISTROLESS_REF=$(grep '^FROM gcr.io/distroless/' Dockerfile | awk '{print $2}')
          echo "Verifying ${DISTROLESS_REF}"
          cosign verify "${DISTROLESS_REF}" \
            --certificate-oidc-issuer https://accounts.google.com \
            --certificate-identity keyless@distroless.iam.gserviceaccount.com

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          outputs: type=cacheonly
          annotations: |
            index:org.opencontainers.image.description=Prometheus exporter for AdGuard Home query logs
            index:org.opencontainers.image.source=https://github.com/sholdee/adguard-exporter
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=dev
            org.opencontainers.image.created=${{ github.event.pull_request.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  renovate:
    needs: detect
    if: needs.detect.outputs.renovate == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate Renovate config
        run: npx --yes --package renovate@43.141.6 -- renovate-config-validator --strict

  gate:
    runs-on: ubuntu-latest
    if: always()
    needs: [detect, test, build, renovate]
    permissions: {}
    steps:
      - name: Evaluate results
        env:
          DETECT: ${{ needs.detect.result }}
          TEST: ${{ needs.test.result }}
          BUILD: ${{ needs.build.result }}
          RENOVATE: ${{ needs.renovate.result }}
        run: |
          echo "detect=${DETECT} test=${TEST} build=${BUILD} renovate=${RENOVATE}"

          for result in "${DETECT}" "${TEST}" "${BUILD}" "${RENOVATE}"; do
            if [[ "${result}" != "success" && "${result}" != "skipped" ]]; then
              echo "CI failed: job returned ${result}"
              exit 1
            fi
          done

          echo "CI passed"
